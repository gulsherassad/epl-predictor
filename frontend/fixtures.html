<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fixtures — EPL Predictor</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/styles.css?v=4">
  <link rel="stylesheet" href="/static/fixtures.css?v=1">
</head>
<body>
  <header class="topbar">
    <div class="topbar-inner">
      <div class="brand">
        <a href="/" style="text-decoration:none;display:flex;align-items:center;gap:14px;color:inherit;">
          <span class="brand-logo">PL</span>
          <div>
            <h1>Premier League Predictor</h1>
            <p>Match Centre</p>
          </div>
        </a>
      </div>
      <nav class="topbar-nav">
        <a href="/" class="nav-link">Predictor</a>
        <a href="/fixtures-page" class="nav-link nav-link-active">Fixtures</a>
      </nav>
    </div>
  </header>

  <main class="page">
    <section class="hero">
      <div class="hero-text">
        <p class="eyebrow">2026/27 Season</p>
        <h2>Upcoming fixtures</h2>
        <p class="subtext">
          Every Premier League fixture with win probabilities, xG, and top scorelines — generated by the Elo + Poisson model.
        </p>
      </div>
    </section>

    <div class="fixtures-controls">
      <button class="fixtures-nav-btn" id="prevMatchday" disabled>← Previous</button>
      <span class="fixtures-matchday-label" id="matchdayLabel">Matchweek —</span>
      <button class="fixtures-nav-btn" id="nextMatchday" disabled>Next →</button>
    </div>

    <div id="fixturesList" class="fixtures-list">
      <div class="fixtures-loading">Loading fixtures…</div>
    </div>
  </main>

  <script src="/static/fixtures.js?v=2"></script>
</body>
</html>
